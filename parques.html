<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escolha o Parque ✨ Disney</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=5" />
</head>
<body class="parks-page">
  <!-- Estrelas de fundo -->
  <div class="stars"></div>

  <!-- Botão de música -->
  <button id="music-toggle" class="music-toggle" aria-label="Ligar/desligar música">
    <span class="music-icon">🎵</span>
    <span class="music-text">Tocar música</span>
  </button>

  <!-- Áudio de fundo -->
  <audio id="bg-music" loop>
    <source src="assets/musica.mp3" type="audio/mpeg" />
  </audio>

  <main class="parks-container">
    <h1 class="title">✨ Escolha o parque ✨</h1>
    <p class="subtitle">Escolha o parque dos seus sonhos</p>

    <div id="parks-list" class="parks-list">
      <!-- Os cards dos parques são gerados pelo parques.js -->
    </div>

    <button id="park-confirm-btn" class="confirm-btn" disabled>Confirmar escolha 💛</button>
    <p id="park-message" class="confirm-message"></p>

    <a href="index.html" class="back-link">← Voltar</a>
  </main>

  <script src="musica.js?v=5"></script>
  <script src="parques.js?v=5"></script>
</body>
</html>
