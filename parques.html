<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escolha o Parque ✨ Disney</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body class="parks-page">
  <!-- Estrelas de fundo -->
  <div class="stars"></div>

  <main class="parks-container">
    <h1 class="title">✨ Escolha o parque ✨</h1>
    <p class="subtitle">Selecione qual parque você deseja visitar</p>

    <div id="parks-list" class="parks-list">
      <!-- Os cards dos parques são gerados pelo parques.js -->
    </div>

    <button id="park-confirm-btn" class="confirm-btn" disabled>Confirmar escolha 💛</button>
    <p id="park-message" class="confirm-message"></p>

    <a href="index.html" class="back-link">← Voltar</a>
  </main>

  <script src="parques.js?v=3"></script>
</body>
</html>
