<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nos vemos lá! ✨ Disney</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=7" />
</head>
<body>
  <!-- Estrelas de fundo -->
  <div class="stars"></div>

  <!-- Botão de música -->
  <button id="music-toggle" class="music-toggle" aria-label="Ligar/desligar música">
    <span class="music-icon">🎵</span>
    <span class="music-text">Tocar música</span>
  </button>

  <!-- Áudio de fundo -->
  <audio id="bg-music" loop>
    <source src="assets/musica.mp3" type="audio/mpeg" />
  </audio>

  <main class="card">
    <h1 class="title" id="final-message">NOS VEMOS LÁ ✨</h1>

    <!-- Espaço central para uma imagem -->
    <div class="photo-frame">
      <img alt="Imagem final" id="final-photo" />
      <span class="photo-placeholder">📷<br />Coloque sua imagem em<br /><code>assets/final.jpg</code> ou <code>.png</code></span>
    </div>
  </main>

  <script src="musica.js?v=7"></script>
  <script src="final.js?v=7"></script>
</body>
</html>
